name: Release

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - name: Calculate publish version
        id: version
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view "$package_name" version 2>/dev/null || true)"
          if [ -z "$published_version" ]; then
            next_version="$package_version"
          else
            next_version="$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); console.log([major, minor, patch + 1].join('.'))" "$published_version")"
          fi
          npm pkg set version="$next_version"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
      - run: npm pack --dry-run
      - name: Publish to npm with trusted publishing
        run: npm publish --access public
      - name: Tag published version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
